services:
  # ── DataTagger MCP ──────────────────────────────────────────────────────────
  datatagger-mcp:
    build:
      context: ./datatagger-mcp
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - FDM_BASE_URL=${FDM_BASE_URL:-https://datatagger.ub.tum.de}
      - URL_PREFIX=/dt
      - MCP_MODE=hosted
      - MCP_PORT=8000
      - MCP_HOST=0.0.0.0
      - PYTHONUNBUFFERED=1
      - MCP_JWT_SECRET=${MCP_JWT_SECRET}
      - MCP_TOKEN_EXPIRY_DAYS=${MCP_TOKEN_EXPIRY_DAYS:-30}
    mem_limit: 512m
    stop_grace_period: 10s

  # ── elabFTW MCP (shared R worker, one process for all users) ──
  elabmcp-proxy:
    build:
      context: .
      dockerfile: elabmcp-proxy/Dockerfile
    restart: unless-stopped
    expose:
      - "8081"
    environment:
      - ELABMCP_PROXY_HOST=0.0.0.0
      - ELABMCP_PROXY_PORT=8081
      - URL_PREFIX=/el
      - MCP_JWT_SECRET=${MCP_JWT_SECRET}
      - MCP_TOKEN_EXPIRY_DAYS=${MCP_TOKEN_EXPIRY_DAYS:-30}
      - ELABMCP_RATE_LIMIT=10/minute
      - ELABMCP_R_PORT=18080
      - MCP_CONFIG_PATH=/elabmcp-proxy/config.dynamic.yml
      - ELABMCP_AUDIT_LOG=/var/log/elabmcp-proxy/audit.log
    mem_limit: 2g
    stop_grace_period: 30s

  # ── eConversion Papers MCP / Streamlit ───────────────────────────────────
  econversion:
    build:
      context: .
      dockerfile: ./econversion.Dockerfile
    restart: unless-stopped
    expose:
      - "8501"
    environment:
      - PYTHONUNBUFFERED=1
      - API_KEY=${ECONVERSION_API_KEY:-}
    volumes:
      - ./econversion/data:/app/data
    mem_limit: 2g
    stop_grace_period: 30s

  # ── Caddy reverse proxy ────────────────────────────────────────────────────
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./web:/srv/http:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - datatagger-mcp
      - elabmcp-proxy
      - econversion
    mem_limit: 128m

volumes:
  caddy_data:
  caddy_config:
