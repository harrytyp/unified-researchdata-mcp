version: "3.8"

services:
  # ── DataTagger MCP ──────────────────────────────────────────────────────────
  datatagger-mcp:
    build:
      context: ./datatagger-mcp
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - FDM_BASE_URL=${FDM_BASE_URL:-https://datatagger.ub.tum.de}
      - FDM_TOKEN=${FDM_TOKEN:-}
      - MCP_MODE=hosted
      - MCP_PORT=8000
      - MCP_HOST=0.0.0.0
      - PYTHONUNBUFFERED=1

  # ── elabFTW MCP (auth-proxy wrapping elabrmcp with per-user subprocesses) ──
  elabmcp-proxy:
    build:
      context: .
      dockerfile: elabmcp-proxy/Dockerfile
    restart: unless-stopped
    expose:
      - "8081"
    environment:
      - ELABMCP_PROXY_HOST=0.0.0.0
      - ELABMCP_PROXY_PORT=8081
      # Optional: passthrough the elabrmcp config path for subprocesses
      - MCP_CONFIG_PATH=
      # Uncomment to allow writes:
      # - MCP_CONFIG_PATH=mcp/elabrmcp/inst/config/config.hybrid.yml

  # ── Caddy reverse proxy ────────────────────────────────────────────────────
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - datatagger-mcp
      - elabmcp-proxy

volumes:
  caddy_data:
  caddy_config:
